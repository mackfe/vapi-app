version: '3.8'

services:
  backend:
    build: ./backend
    container_name: vapi-backend
    restart: always
    ports:
      - "5000:5000"     # API & Socket.io
      - "5060:5060/udp" # SIP UDP
      - "16384:16384/udp" # RTP UDP
    env_file: 
      - .env
    # Si tienes problemas de audio (NAT), puedes probar 'network_mode: host' 
    # y comentar la sección 'ports' de arriba.
    # network_mode: host

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://${VPS_IP}:5000
    container_name: vapi-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
